name: Update blog posts on README

on:
  schedule:
    # 매일 00:10 UTC (KST 09:10)
    - cron: "10 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: blog-rss
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh latest posts from RSS
        run: node .github/scripts/update-blog.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- profile/README.md; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/README.md
          git commit -m "chore(profile): 블로그 최신 글 자동 갱신"
          git push
